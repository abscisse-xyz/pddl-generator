name: briefcaseworld
binary: ./briefcaseworld
domain_file:
  source: static
  path: domain.pddl
output:
  mode: stdout
parameters:
  - {name: objects, type: int, flag: "-o", required: true, default_test: 2, description: "Number of objects (minimal 1)"}
  - {name: seed,    type: int, flag: "-s", default_test: 1, description: "Random seed"}
