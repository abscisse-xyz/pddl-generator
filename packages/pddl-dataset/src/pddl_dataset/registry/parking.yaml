name: parking
binary: ./parking-generator.pl
domain_file:
  source: static
  path: domain.pddl
output:
  mode: stdout
parameters:
  - {name: problem_name, type: str, positional: 0, default_test: "problem"}
  - {name: rows,         type: int, positional: 1, required: true, default_test: 3, description: "Number of curb rows"}
  - {name: cars,         type: int, positional: 2, required: true, default_test: 4, description: "Number of cars"}
  - {name: variant,      type: str, positional: 3, default_test: "seq", description: "Action style: seq | strips"}
  - {name: seed,         type: int, positional: 4, default_test: 1}
