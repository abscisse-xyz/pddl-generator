name: spider
binary: ./generate.py
domain_file:
  source: static
  path: domain.pddl
output:
  mode: stdout
parameters:
  - name: num_decks
    type: int
    positional: 0
    required: true
    default_test: 1
    description: "Number of decks of cards"
  - name: num_suits
    type: int
    positional: 1
    required: true
    default_test: 2
    description: "Number of different suits per deck"
  - name: num_values
    type: int
    positional: 2
    required: true
    default_test: 3
    description: "Number of different values per suit per deck"
  - name: num_piles
    type: int
    positional: 3
    required: true
    default_test: 3
    description: "Number of piles"
  - name: num_deals
    type: int
    positional: 4
    required: true
    default_test: 1
    description: "Number of deals"
  - name: seed
    type: int
    positional: 5
    required: true
    default_test: 1
    description: "Random seed"
  - name: output_type
    type: str
    positional: 6
    required: true
    default_test: pddl
    description: "Output type: pddl, raw, or readable"
