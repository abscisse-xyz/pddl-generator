name: snake
binary: ./generate.py
domain_file:
  source: static
  path: domain.pddl
output:
  mode: stdout
parameters:
  - name: board
    type: str
    positional: 0
    required: true
    default_test: boards/no-spawn-6x6.txt
    description: "Board file path or 'emptyWxH' specifier"
  - name: snake_size
    type: int
    positional: 1
    required: true
    default_test: 1
    description: "Initial size of the snake"
  - name: num_initial_apples
    type: int
    positional: 2
    required: true
    default_test: 3
    description: "Number of apples at the beginning"
  - name: num_spawn_apples
    type: str
    positional: 3
    required: true
    default_test: 40%
    description: "Number of apples that spawn (integer or 'N%')"
  - name: seed
    type: int
    positional: 4
    required: true
    default_test: 1
    description: "Random seed"
  - name: output_type
    type: str
    positional: 5
    required: true
    default_test: pddl
    description: "Output type: pddl, raw, readable, or draw"
