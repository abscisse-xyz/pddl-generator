name: travel
python_module: pddl_problem.travel.generator_cmd_line
domain_file:
  source: emitted_by_generator
  flag: "-domain_file"
output:
  mode: file_arg
  flag: "-problem_file"
fixed_args:
  - "-problem_name"
  - "travel"
parameters:
  - {name: locations,        type: int,   flag: "-locations",        required: true, default_test: 5,   description: "Number of locations (>=2)"}
  - {name: extra_edges,      type: int,   flag: "-extra_edges",      default_test: 2,   description: "Number of extra forward shortcuts (max = (L-1)*(L-2)/2)"}
  - {name: min_travel_time,  type: int,   flag: "-min_travel_time",  default_test: 20}
  - {name: max_travel_time,  type: int,   flag: "-max_travel_time",  default_test: 120}
  - {name: bidirectional,    type: bool,  flag: "-bidirectional",    default_test: False, description: "If True, emit (is_connected b a) for every (is_connected a b)"}
  - {name: seed,             type: int,   flag: "-seed",             description: "Random seed"}
